<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Personal MBA Feed</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📚</text></svg>">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-brand">
    <span class="brand-icon">📚</span>
    <span class="brand-name">MBA Feed</span>
  </div>
  <div class="hdr-stats">
    <div class="streak-chip">
      <span class="streak-fire">🔥</span>
      <span id="streak-count">0</span>
    </div>
    <div class="xp-chip">
      <span id="xp-level">Lv.1</span>
      <div class="xp-bar-track"><div id="xp-bar" class="xp-bar-fill" style="width:0%"></div></div>
    </div>
  </div>
</header>

<!-- ── FEED TAB ───────────────────────────────────────────────────────────── -->
<main id="feed-section" class="tab-section">
  <div class="filter-scroll-wrap">
    <div id="pillar-filter" class="filter-bar"></div>
  </div>
  <div id="feed-list" class="feed-list"></div>
  <div id="feed-skeleton" class="skeleton-list hidden">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>
  <div id="feed-sentinel" class="sentinel"></div>
</main>

<!-- ── DASHBOARD TAB ──────────────────────────────────────────────────────── -->
<main id="dashboard-section" class="tab-section hidden">
  <div id="dashboard-content" class="dashboard-content"></div>
</main>

<!-- ── BOOKMARKS TAB ─────────────────────────────────────────────────────── -->
<main id="bookmarks-section" class="tab-section hidden">
  <div class="section-title-bar">
    <h2>Bookmarks</h2>
  </div>
  <div id="bookmarks-list" class="feed-list"></div>
</main>

<!-- ── PROFILE TAB ────────────────────────────────────────────────────────── -->
<main id="profile-section" class="tab-section hidden">
  <div id="profile-content" class="profile-content"></div>
</main>

<!-- ── BOTTOM NAV ────────────────────────────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="feed" onclick="switchTab('feed')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    <span>Feed</span>
  </button>
  <button class="nav-btn" data-tab="dashboard" onclick="switchTab('dashboard')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>Progress</span>
  </button>
  <button class="nav-btn" data-tab="bookmarks" onclick="switchTab('bookmarks')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Saved</span>
  </button>
  <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profile</span>
  </button>
</nav>

<!-- ── COMMENT MODAL ─────────────────────────────────────────────────────── -->
<div id="comment-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Comments</h3>
      <button id="comment-close" class="modal-close">✕</button>
    </div>
    <div id="existing-comments" class="existing-comments"></div>
    <div class="comment-input-wrap">
      <textarea id="comment-input" class="comment-textarea" placeholder="Add a note…" rows="3"></textarea>
      <button id="comment-submit" class="btn-primary">Save (+5 XP)</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- ── DETAIL OVERLAY ────────────────────────────────────────────────────── -->
<div id="detail-overlay" class="hidden"></div>

<!-- ── SCRIPTS ───────────────────────────────────────────────────────────── -->
<script src="js/log.js"></script>
<script src="js/config.js"></script>
<script src="js/seed-data.js"></script>
<script src="js/api.js"></script>
<script src="js/cards.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/detail.js"></script>
<script src="js/app.js"></script>
</body>
</html>
