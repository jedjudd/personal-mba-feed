<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MBA Feed Admin</title>
  <style>
    :root { --bg:#0f172a; --bg2:#1e293b; --bg3:#334155; --text:#f1f5f9; --muted:#94a3b8; --border:rgba(255,255,255,0.08); --accent:#6366f1; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; min-height:100vh; }
    .hdr { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:12px; }
    .hdr h1 { font-size:18px; }
    .hdr a { color:var(--muted); font-size:13px; margin-left:auto; text-decoration:none; }
    .main { max-width:700px; margin:0 auto; padding:20px; display:flex; flex-direction:column; gap:20px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:20px; }
    h2 { font-size:16px; font-weight:700; margin-bottom:14px; }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    input[type=password], input[type=text], textarea, select {
      width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; color:var(--text); font:inherit; font-size:14px;
    }
    input:focus, textarea:focus { outline:none; border-color:var(--accent); }
    .btn { background:var(--accent); color:#fff; border-radius:8px; padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:opacity 0.15s; }
    .btn:hover { opacity:0.85; }
    .btn-sec { background:var(--bg3); color:var(--text); }
    .row { display:flex; gap:10px; align-items:flex-end; }
    .row > * { flex:1; }
    .msg { font-size:13px; padding:10px 12px; border-radius:8px; margin-top:10px; }
    .msg.ok  { background:rgba(34,197,94,0.15); color:#22c55e; }
    .msg.err { background:rgba(239,68,68,0.15);  color:#ef4444; }
    .hidden { display:none; }
.schema-block { background:var(--bg3); border-radius:8px; padding:14px; font-size:12px; line-height:1.7; font-family:monospace; overflow-x:auto; white-space:pre; }
    .prompt-block { background:var(--bg3); border-radius:8px; padding:14px; font-size:13px; line-height:1.7; color:var(--muted); }
    .post-preview { border:1px solid var(--border); border-radius:10px; padding:12px; font-size:13px; display:flex; flex-direction:column; gap:6px; }
    .pp-type { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; }
    .pp-title { font-weight:600; }
    .pending-list { display:flex; flex-direction:column; gap:10px; }
    .pp-actions { display:flex; gap:8px; margin-top:6px; }
    .pp-actions button { font-size:12px; padding:5px 12px; border-radius:6px; }
    .rec-list { display:flex; flex-direction:column; gap:10px; }
    .rec-item { background:var(--bg3); border-radius:8px; padding:12px; font-size:13px; }
    .rec-book { font-weight:700; margin-bottom:2px; }
    .rec-why { color:var(--muted); }
    .rec-pillar { font-size:11px; color:var(--accent); font-weight:600; margin-top:4px; }
  </style>
</head>
<body>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="hdr">
    <span>📚</span>
    <h1>MBA Feed Admin</h1>
    <a href="../">← Back to Feed</a>
  </div>

  <div class="main">

    <!-- IMPORT JSON -->
    <div class="card">
      <h2>📥 Import New Posts (JSON)</h2>
      <label>Paste JSON array of posts</label>
      <textarea id="import-json" rows="8" placeholder='[{"id":"...","type":"quote",...}]'></textarea>
      <div style="height:10px"></div>
      <div class="row">
        <button class="btn btn-sec" onclick="previewImport()">Preview</button>
        <button class="btn" onclick="importPosts()">Send to Google Sheet</button>
      </div>
      <div id="import-msg" class="msg hidden"></div>
      <div id="import-preview" class="pending-list" style="margin-top:14px"></div>
    </div>

    <!-- GENERATE PROMPT -->
    <div class="card">
      <h2>🤖 Generate New Posts</h2>
      <label>Book Title</label>
      <input type="text" id="book-title" placeholder="e.g. Influence by Robert Cialdini">
      <div style="height:10px"></div>
      <label>Number of posts to generate</label>
      <select id="post-count">
        <option value="10">10 posts</option>
        <option value="20" selected>20 posts</option>
        <option value="30">30 posts</option>
      </select>
      <div style="height:12px"></div>
      <button class="btn" onclick="generatePrompt()">Copy Prompt to Clipboard</button>
      <div id="prompt-output" class="hidden" style="margin-top:14px">
        <label>Paste into Claude or ChatGPT:</label>
        <div id="prompt-text" class="prompt-block" style="margin-top:6px"></div>
      </div>
    </div>

    <!-- JSON SCHEMA -->
    <div class="card">
      <h2>📋 Post JSON Schema</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Use this format when generating or importing posts.</p>
      <div class="schema-block" id="schema-display"></div>
    </div>

    <!-- RECOMMENDED BOOKS -->
    <div class="card">
      <h2>📚 Recommended Additional Books</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">10-15 titles to fill gaps in your MBA curriculum.</p>
      <div class="rec-list" id="rec-books"></div>
    </div>

    <!-- FREE RESOURCES -->
    <div class="card">
      <h2>🔗 Free Resources by Pillar</h2>
      <div id="free-resources" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <!-- PROGRESS RESET -->
    <div class="card">
      <h2>⚙️ Data Management</h2>
      <div class="row">
        <button class="btn btn-sec" onclick="exportProgress()">Export Progress JSON</button>
        <button class="btn" style="background:#ef4444" onclick="nukeProgress()">Reset All Progress</button>
      </div>
      <div style="height:10px"></div>
      <button class="btn btn-sec" style="width:100%" onclick="clearSWCache()">Force App Update (clear cache)</button>
    </div>

  </div>
</div>

<script>
function initAdmin() {
  renderSchema();
  renderRecommended();
  renderResources();
}

function previewImport() {
  const raw = document.getElementById('import-json').value.trim();
  const previewEl = document.getElementById('import-preview');
  const msg = document.getElementById('import-msg');
  try {
    const posts = JSON.parse(raw);
    if (!Array.isArray(posts)) throw new Error('Expected an array');
    previewEl.innerHTML = posts.map(p => `
      <div class="post-preview">
        <div class="pp-type">${p.type || 'unknown'}</div>
        <div class="pp-title">${p.bookTitle || 'No book'} — ${p.author || ''}</div>
        <div style="color:var(--muted);font-size:12px">${(p.pillars||[]).join(', ')} · ${p.difficulty||''}</div>
        <div class="pp-actions">
          <button class="btn btn-sec" onclick="this.closest('.post-preview').style.opacity='0.4'">Skip</button>
          <span style="font-size:11px;color:var(--muted);align-self:center">ID: ${p.id}</span>
        </div>
      </div>`).join('');
    msg.className = 'msg ok'; msg.textContent = `✓ ${posts.length} posts parsed successfully.`; msg.classList.remove('hidden');
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Invalid JSON: ' + e.message; msg.classList.remove('hidden');
    previewEl.innerHTML = '';
  }
}

async function importPosts() {
  const raw = document.getElementById('import-json').value.trim();
  const msg = document.getElementById('import-msg');
  let posts;
  try {
    posts = JSON.parse(raw);
    if (!Array.isArray(posts)) throw new Error('Expected a JSON array');
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Invalid JSON: ' + e.message; msg.classList.remove('hidden');
    return;
  }

  const apiUrl = localStorage.getItem('mba_api_url') || '';
  if (!apiUrl) {
    msg.className = 'msg err'; msg.textContent = 'No Apps Script URL saved — go to Settings in the main app and save your URL first.'; msg.classList.remove('hidden');
    return;
  }

  msg.className = 'msg ok'; msg.textContent = `Sending ${posts.length} posts to Google Sheet…`; msg.classList.remove('hidden');

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'importPosts', posts }),
    });
    const data = await res.json();
    if (data.ok) {
      msg.className = 'msg ok'; msg.textContent = `✓ ${data.imported} posts imported to Google Sheet successfully!`;
    } else {
      msg.className = 'msg err'; msg.textContent = 'Sheet error: ' + (data.error || JSON.stringify(data));
    }
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Network error: ' + e.message;
  }
  msg.classList.remove('hidden');
}

function generatePrompt() {
  const title = document.getElementById('book-title').value.trim();
  const count = document.getElementById('post-count').value;
  if (!title) { alert('Enter a book title first.'); return; }
  const prompt = buildPrompt(title, count);
  navigator.clipboard.writeText(prompt).catch(() => {});
  document.getElementById('prompt-text').textContent = prompt;
  document.getElementById('prompt-output').classList.remove('hidden');
}

function buildPrompt(title, count) {
  return `Generate ${count} post cards for the Personal MBA Feed app from the book "${title}".

Return a valid JSON array. Each post MUST follow this schema exactly:
{
  "id": "unique-slug-001",
  "type": "quote|framework|insight|carousel|quiz|stat|reflection|summary",
  "bookId": "url-safe-book-id",
  "bookTitle": "${title}",
  "author": "Author Name",
  "pillars": ["one or more of: Strategy, Finance, Leadership, Operations, Marketing, Systems Thinking, Personal Development, Communication, Entrepreneurship, Product Management"],
  "difficulty": "Beginner|Intermediate|Advanced",
  "content": { /* type-specific, see schema below */ }
}

CONTENT SCHEMAS BY TYPE:

quote:    { "quote": "...", "context": "brief context sentence" }
framework:{ "title": "...", "subtitle": "...", "items": [{"label":"...","color":"#hex"}], "insight": "real-world application" }
insight:  { "headline": "...", "body": "3-5 sentences", "example": "real-world example" }
carousel: { "title": "...", "slides": [{"title":"...","body":"..."}] } // 3-5 slides
quiz:     { "questions": [{"q":"...","options":["A","B","C","D"],"correct":0,"explanation":"..."}] } // 2-4 questions
stat:     { "number": "42%", "label": "what this measures", "context": "why it matters" }
reflection: { "prompt": "context from the book", "question": "journaling/scenario question" }
summary:  { "premise": "core thesis", "takeaways": ["1","2","3"], "bestQuote": "...", "nextRead": "book + why" }

Mix types evenly. Make quiz questions scenario-based (real decisions, not just recall). Make stat cards visually striking. Include at least 2 framework cards, 2 quiz cards, 1 summary card, and 2 reflection cards.

Return ONLY the JSON array. No markdown, no explanation.`;
}

const SCHEMA = `// Example: quiz post
{
  "id": "book-slug-001",
  "type": "quiz",
  "bookId": "book-slug",
  "bookTitle": "Book Title",
  "author": "Author Name",
  "pillars": ["Strategy", "Leadership"],
  "difficulty": "Intermediate",
  "content": {
    "questions": [
      {
        "q": "Scenario-based question?",
        "options": ["Option A", "Option B", "Option C", "Option D"],
        "correct": 1,
        "explanation": "Why this answer is correct."
      }
    ]
  }
}

// Example: quote post
{
  "id": "book-slug-002",
  "type": "quote",
  "bookId": "book-slug",
  "bookTitle": "Book Title",
  "author": "Author Name",
  "pillars": ["Personal Development"],
  "difficulty": "Beginner",
  "content": {
    "quote": "The quote text.",
    "context": "Context about the book and why this quote matters."
  }
}`;

function renderSchema() {
  document.getElementById('schema-display').textContent = SCHEMA;
}

const RECOMMENDED = [
  { title: "Never Split the Difference", author: "Chris Voss", pillar: "Communication / Negotiation", why: "FBI hostage negotiator. Best modern negotiation book — tactical empathy, mirroring, calibrated questions." },

  { title: "Zero to One", author: "Peter Thiel", pillar: "Entrepreneurship / Strategy", why: "Counter to Lean Startup — argues for bold secrets and monopolies, not incremental iterations." },
  { title: "Influence: Science and Practice", author: "Robert Cialdini", pillar: "Marketing / Communication", why: "Six principles of persuasion. Essential paired with your existing Communication titles." },

  { title: "The Hard Thing About Hard Things", author: "Ben Horowitz", pillar: "Entrepreneurship / Leadership", why: "Raw, unfiltered startup leadership in crisis. Pairs with all your leadership books." },

  { title: "Predictably Irrational", author: "Dan Ariely", pillar: "Marketing / Systems Thinking", why: "How irrational behavior follows patterns — pricing, anchoring, relativity. Deepens your Marketing pillar." },

function renderRecommended() {
  document.getElementById('rec-books').innerHTML = RECOMMENDED.map(r => `
    <div class="rec-item">
      <div class="rec-book">${r.title} <span style="font-weight:400;color:var(--muted)">— ${r.author}</span></div>
      <div class="rec-why">${r.why}</div>
      <div class="rec-pillar">📌 ${r.pillar}</div>
    </div>`).join('');
}

  { pillar: 'Strategy', items: [
    { name: 'Stanford Strategy Lectures (YouTube)', url: 'https://youtube.com/@stanfordgsb', desc: 'Free business school content' },
    { name: 'HBR Idea Cast Podcast', url: 'https://hbr.org/2018/01/podcast-ideacast', desc: 'Harvard Business Review weekly' },
  ]},
  { pillar: 'Finance', items: [
    { name: 'Aswath Damodaran YouTube', url: 'https://youtube.com/@AswathDamodaranonValuation', desc: 'NYU professor, best free finance education online' },

  ]},
  { pillar: 'Leadership', items: [

    { name: 'Dare to Lead podcast (Brené Brown)', url: 'https://brenebrown.com/podcast/dare-to-lead-podcast/', desc: 'Vulnerability and courage in leadership' },
  ]},

  ]},
  { pillar: 'Marketing', items: [

  ]},
  { pillar: 'Systems Thinking', items: [

  ]},
  { pillar: 'Personal Development', items: [
    { name: 'Tim Ferriss Show Podcast', url: 'https://tim.blog/podcast/', desc: 'Top performers sharing mental models and routines' },
    { name: 'Huberman Lab Podcast', url: 'https://hubermanlab.com/podcast/', desc: 'Neuroscience of peak performance and habits' },
  ]},
  { pillar: 'Entrepreneurship', items: [

  ]},
  { pillar: 'Product Management', items: [

    { name: 'ProductHunt YouTube (PM talks)', url: 'https://youtube.com/@ProductHunt', desc: 'Product leaders sharing processes and frameworks' },

];

function renderResources() {
  document.getElementById('free-resources').innerHTML = RESOURCES.map(r => `
    <div style="background:var(--bg3);border-radius:10px;padding:12px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px">${r.pillar}</div>
      ${r.items.map(i => `
        <div style="margin-bottom:8px">
          <a href="${i.url}" target="_blank" rel="noopener" style="color:var(--text);font-size:13px;font-weight:600;text-decoration:underline">${i.name}</a>
          <div style="font-size:12px;color:var(--muted)">${i.desc}</div>
        </div>`).join('')}
    </div>`).join('');
}

function clearSWCache() {
  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
      alert('Cache cleared. The app will reload with fresh files.');
      location.reload(true);
    });
  } else {
    alert('Cache API not available in this browser.');
  }
}

function exportProgress() {
  const data = localStorage.getItem('mba_progress_v1') || '{}';
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'mba-progress.json'; a.click();
}

function nukeProgress() {
  if (!confirm('Delete ALL progress? This cannot be undone.')) return;
  localStorage.removeItem('mba_progress_v1');
  alert('Progress reset.');
}

document.addEventListener('DOMContentLoaded', initAdmin);
</script>
</body>
</html>
